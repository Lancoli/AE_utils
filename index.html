<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AE Expressions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f0f11;
  --s1:      #17171b;
  --s2:      #1e1e24;
  --s3:      #26262e;
  --border:  #2c2c36;
  --text:    #e2e0ec;
  --sub:     #8b8899;
  --dim:     #4e4c5a;
  --accent:  #8b6cf7;
  --acc-l:   #b89dff;
  --green:   #4ade80;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}

body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

/* HEADER */
header {
  padding: 1.375rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.logo-mark {
  width: 30px; height: 30px; background: var(--accent); border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; font-weight: 500; color: #fff; flex-shrink: 0;
}
.logo-name { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
.logo-sub  { font-size: 11px; color: var(--dim); font-family: var(--mono); margin-top: 1px; }
.h-count   { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--dim); }
.h-count b { color: var(--acc-l); font-weight: 500; }

/* TOOLBAR */
.toolbar {
  padding: 0.75rem 2rem; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
  background: rgba(15,15,17,0.96); backdrop-filter: blur(10px); z-index: 20;
}
.sw { position: relative; flex: 1; min-width: 150px; max-width: 260px; }
.sw svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; stroke: var(--dim); pointer-events: none; }
input[type="search"] {
  width: 100%; background: var(--s2); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px 6px 27px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color .15s;
}
input[type="search"]:focus { border-color: var(--accent); }
input[type="search"]::placeholder { color: var(--dim); }
.filters { display: flex; gap: 5px; flex-wrap: wrap; }
.fb {
  font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent; color: var(--dim);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.fb:hover { border-color: var(--accent); color: var(--acc-l); }
.fb.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* TILE GRID */
.gwrap { background: var(--bg); }
.tgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); }

.tile {
  background: var(--s1); padding: 1.125rem 1.25rem;
  cursor: pointer; transition: background .12s;
  display: flex; flex-direction: column; gap: 8px; user-select: none;
}
.tile:hover { background: var(--s2); }
.tile.on { background: var(--s2); box-shadow: inset 2px 0 0 var(--accent); }

.tile-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.tile-name { font-size: 13px; font-weight: 600; letter-spacing: -0.1px; line-height: 1.3; }
.ttag {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.4px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px; flex-shrink: 0; margin-top: 1px;
}
.t-boucle     { background: #221550; color: #b89dff; }
.t-timing     { background: #122010; color: #4ade80; }
.t-valeur     { background: #241708; color: #fb923c; }
.t-physique   { background: #0a1a26; color: #38bdf8; }
.t-texte      { background: #220a14; color: #f472b6; }
.t-utilitaire { background: #1a1a1a; color: #71717a; }

.tile-desc {
  font-size: 12px; color: var(--sub); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.tile-props { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
.pchip {
  font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 3px;
  background: var(--s3); border: 1px solid var(--border); color: var(--dim);
}

.empty { grid-column: 1/-1; padding: 4rem; text-align: center; font-family: var(--mono); font-size: 12px; color: var(--dim); }

/* PANEL */
.overlay { display: none; position: fixed; inset: 0; z-index: 30; }
.overlay.open { display: block; }
.backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
.panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: min(460px, 100vw);
  background: var(--s1); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .2s cubic-bezier(.4,0,.2,1); overflow: hidden;
}
.overlay.open .panel { transform: translateX(0); }

.ph {
  padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px;
}
.ph-text { flex: 1; min-width: 0; }
.ph-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.2; }
.ph-tag { margin-top: 5px; display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.4px; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; }

.close {
  width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border);
  background: transparent; color: var(--sub); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .12s;
}
.close:hover { background: var(--s3); color: var(--text); }
.close svg { width: 12px; height: 12px; stroke: currentColor; }

.pbody { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

.slabel { font-size: 10px; font-weight: 500; letter-spacing: 0.6px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.pdesc  { font-size: 13px; color: var(--sub); line-height: 1.65; }
.pprops { display: flex; gap: 5px; flex-wrap: wrap; }
.pprop  { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; background: var(--s2); border: 1px solid var(--border); color: var(--sub); }

.cblock { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.cbar   { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; border-bottom: 1px solid var(--border); background: var(--s2); }
.clang  { font-family: var(--mono); font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--dim); }
.cpbtn  {
  font-family: var(--mono); font-size: 10px; padding: 3px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: transparent; color: var(--sub);
  cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 5px;
}
.cpbtn:hover { border-color: var(--acc-l); color: var(--acc-l); }
.cpbtn.ok    { border-color: var(--green); color: var(--green); }

pre { padding: 14px; font-family: var(--mono); font-size: 11px; line-height: 1.75; color: #a8a4c4; overflow-x: auto; white-space: pre; }
pre .kw { color: #b89dff; }
pre .fn { color: #7dd3fc; }
pre .cm { color: #45435a; font-style: italic; }
pre .nb { color: #fb923c; }

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.hint { padding: 0.75rem 2rem; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--dim); }
.hint code { background: var(--s2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; color: var(--acc-l); }
</style>
</head>
<body>

<header>
  <div class="logo-mark">AE</div>
  <div>
    <div class="logo-name">Expressions</div>
    <div class="logo-sub">after effects · library</div>
  </div>
  <div class="h-count" id="counter"><b>0</b> expressions</div>
</header>

<div class="toolbar">
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="Rechercher..." autocomplete="off">
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="gwrap"><div class="tgrid" id="grid"></div></div>

<div class="hint">Pour ajouter une expression, édite le tableau <code>EXPRESSIONS</code> dans le fichier HTML.</div>

<div class="overlay" id="overlay">
  <div class="backdrop" onclick="close_()"></div>
  <div class="panel">
    <div class="ph">
      <div class="ph-text">
        <div class="ph-title" id="p-title"></div>
        <div class="ph-tag" id="p-tag"></div>
      </div>
      <button class="close" onclick="close_()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="pbody">
      <div><div class="slabel">Description</div><div class="pdesc" id="p-desc"></div></div>
      <div><div class="slabel">Propriétés compatibles</div><div class="pprops" id="p-props"></div></div>
      <div>
        <div class="slabel">Expression</div>
        <div class="cblock">
          <div class="cbar">
            <span class="clang">js · after effects</span>
            <button class="cpbtn" id="cpbtn" onclick="copyNow()">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copier
            </button>
          </div>
          <pre id="p-code"></pre>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   EXPRESSIONS — ajoute les tiennes ici !
   ═══════════════════════════════════════════════════ */
const EXPRESSIONS = [
  {
    title: "Vine loop",
    tag: "boucle",
    props: ["Position", "Rotation", "Opacité", "Échelle", "Tout"],
    desc: "Joue les clés A→B puis rebobine B→A en boucle infinie. Lit automatiquement toutes les clés de la propriété.",
    code: `(function(){
  var k = thisProperty.numKeys;
  if (k < 2) return value;

  var t0 = thisProperty.key(1).time;
  var t1 = thisProperty.key(k).time;
  var dur = t1 - t0;
  var cycle = dur * 2;

  var t = (time - t0) % cycle;
  if (t < 0) t += cycle;

  var playTime;
  if (t <= dur) {
    playTime = t0 + t;
  } else {
    playTime = t1 - (t - dur);
  }

  return thisProperty.valueAtTime(playTime);
})();`
  },
  {
    title: "Loop out (cycle)",
    tag: "boucle",
    props: ["Position", "Rotation", "Opacité", "Échelle", "Tout"],
    desc: "Boucle classique après la dernière clé. La séquence repart depuis le début indéfiniment.",
    code: `loopOut("cycle");`
  },
  {
    title: "Loop ping-pong",
    tag: "boucle",
    props: ["Position", "Rotation", "Opacité", "Échelle", "Tout"],
    desc: "Boucle aller-retour native AE. Alternative légère au Vine loop, sans code custom.",
    code: `loopOut("pingpong");`
  },
  {
    title: "Loop in + out",
    tag: "boucle",
    props: ["Position", "Rotation", "Opacité", "Tout"],
    desc: "Boucle dans les deux directions — avant la première clé ET après la dernière.",
    code: `loopIn("cycle");
loopOut("cycle");`
  },
  {
    title: "Wiggle",
    tag: "valeur",
    props: ["Position", "Rotation", "Opacité"],
    desc: "Tremblement aléatoire continu. Contrôle la fréquence (oscillations/sec) et l'amplitude en px ou degrés.",
    code: `var freq = 2;   // oscillations par seconde
var amp  = 20;  // amplitude en px ou degrés
wiggle(freq, amp);`
  },
  {
    title: "Wiggle seed fixe",
    tag: "valeur",
    props: ["Position", "Rotation"],
    desc: "Wiggle reproductible avec un seed unique par calque. Chaque instance a un mouvement différent mais stable.",
    code: `var freq = 2;
var amp  = 15;
var seed = index; // unique par calque
seedRandom(seed, true);
wiggle(freq, amp);`
  },
  {
    title: "Oscillation sinusoïdale",
    tag: "valeur",
    props: ["Position", "Rotation", "Opacité"],
    desc: "Mouvement fluide et régulier basé sur un sinus. Contrôle précis de la vitesse, l'amplitude et la phase.",
    code: `var freq  = 1;   // cycles par seconde
var amp   = 50;  // amplitude
var phase = 0;   // décalage en radians

var val = Math.sin(time * freq * Math.PI * 2 + phase) * amp;

// Position 2D : [value[0], value[1] + val]
// Rotation    : value + val
value + val;`
  },
  {
    title: "Inertie / élastique",
    tag: "physique",
    props: ["Position", "Échelle", "Rotation"],
    desc: "Rebond élastique après le dernier mouvement. Simule une inertie physique réaliste sur toute propriété animée.",
    code: `var amp   = 0.06;  // amplitude du rebond
var freq  = 2.5;   // fréquence
var decay = 4.0;   // amortissement

var n = 0;
if (numKeys > 1) {
  n = nearestKey(time).index;
  if (key(n).time > time) n--;
}
if (n === 0) { value; }
else {
  var t = time - key(n).time;
  var v = velocityAtTime(key(n).time - thisComp.frameDuration / 10);
  var val = value + v * amp * Math.sin(freq * t * Math.PI * 2) / Math.exp(decay * t);
  val;
}`
  },
  {
    title: "Compteur animé",
    tag: "texte",
    props: ["Source Text"],
    desc: "Affiche un nombre qui monte entre deux clés. Pose des clés sur Source Text, le compteur s'anime automatiquement.",
    code: `var startVal = 0;
var endVal   = 100;
var decimals = 0;   // chiffres après la virgule

var t0 = thisProperty.key(1).time;
var t1 = thisProperty.key(thisProperty.numKeys).time;
var p  = Math.max(0, Math.min(1, (time - t0) / (t1 - t0)));

var current = startVal + (endVal - startVal) * p;
current.toFixed(decimals);`
  },
  {
    title: "Lien vers un autre calque",
    tag: "valeur",
    props: ["Position", "Rotation", "Opacité", "Tout"],
    desc: "Récupère la valeur d'une propriété d'un autre calque. Liaison directe sans parenting.",
    code: `var src = thisComp.layer("NOM_DU_CALQUE");
src.transform.position; // remplace par la propriété voulue`
  },
  {
    title: "Temps courant",
    tag: "timing",
    props: ["Tout"],
    desc: "Retourne le temps en secondes, en frames ou formaté mm:ss. Utile pour piloter des animations procédurales.",
    code: `// Temps en secondes
time;

// Temps en frames
timeToFrames(time);

// Formaté mm:ss
var s = Math.floor(time);
var m = Math.floor(s / 60);
m + ":" + ("0" + (s % 60)).slice(-2);`
  },
  {
    title: "Random fixe par calque",
    tag: "utilitaire",
    props: ["Position", "Rotation", "Opacité", "Tout"],
    desc: "Valeur aléatoire unique par calque, fixe dans le temps. Idéal pour décaler des instances sans animer.",
    code: `var minVal = 0;
var maxVal = 360;

seedRandom(index, true); // true = fixe dans le temps
random(minVal, maxVal);`
  },
  {
    title: "Stagger par index",
    tag: "timing",
    props: ["Opacité", "Position", "Tout"],
    desc: "Décale l'animation de chaque calque selon son index. Crée des cascades sans dupliquer les clés.",
    code: `var delay = 0.1; // secondes entre chaque calque
var offset = (index - 1) * delay;
var t = time - offset;

thisComp.layer(1).transform.opacity.valueAtTime(t);
// Remplace par la propriété source souhaitée`
  },
];

/* ═══════════════════════════════════════════════════
   MOTEUR
   ═══════════════════════════════════════════════════ */
const TAGS = { boucle:"Boucle", timing:"Timing", valeur:"Valeur", physique:"Physique", texte:"Texte", utilitaire:"Utilitaire" };
let activeTag = null, searchVal = "", activeExpr = null;

const $  = id => document.getElementById(id);
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function hi(code) {
  return esc(code)
    .replace(/(\/\/[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/\b(var|const|let|if|else|return|function|Math)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(wiggle|loopOut|loopIn|seedRandom|random|timeToFrames|valueAtTime|velocityAtTime|nearestKey|numKeys)\b/g,'<span class="fn">$1</span>')
    .replace(/(?<![a-zA-Z\.])(\d+\.?\d*)\b/g,'<span class="nb">$1</span>');
}

function filtered() {
  const q = searchVal.toLowerCase();
  return EXPRESSIONS.filter(e => {
    const mt = !activeTag || e.tag === activeTag;
    const mq = !q || e.title.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q)
      || e.tag.includes(q) || (e.props||[]).some(p=>p.toLowerCase().includes(q));
    return mt && mq;
  });
}

function render() {
  $("counter").innerHTML = `<b>${EXPRESSIONS.length}</b> expressions`;
  const list = filtered();
  const g = $("grid");
  if (!list.length) { g.innerHTML = '<div class="empty">Aucune expression trouvée.</div>'; return; }
  g.innerHTML = list.map(e => `
    <div class="tile${activeExpr===e?' on':''}" onclick="open_(${EXPRESSIONS.indexOf(e)})">
      <div class="tile-top">
        <div class="tile-name">${esc(e.title)}</div>
        <div class="ttag t-${e.tag}">${TAGS[e.tag]||e.tag}</div>
      </div>
      <div class="tile-desc">${esc(e.desc)}</div>
      ${e.props?`<div class="tile-props">${e.props.map(p=>`<span class="pchip">${esc(p)}</span>`).join('')}</div>`:''}
    </div>`).join('');
}

function open_(idx) {
  const e = EXPRESSIONS[idx];
  if (!e) return;
  activeExpr = e;
  $("p-title").textContent = e.title;
  const pt = $("p-tag");
  pt.textContent = TAGS[e.tag]||e.tag;
  pt.className = `ph-tag ttag t-${e.tag}`;
  $("p-desc").textContent = e.desc;
  $("p-props").innerHTML = (e.props||[]).map(p=>`<span class="pprop">${esc(p)}</span>`).join('');
  $("p-code").innerHTML = hi(e.code);
  const cb = $("cpbtn");
  cb.classList.remove("ok");
  cb.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copier`;
  $("overlay").classList.add("open");
  render();
}

function close_() {
  activeExpr = null;
  $("overlay").classList.remove("open");
  render();
}

function copyNow() {
  if (!activeExpr) return;
  navigator.clipboard.writeText(activeExpr.code).then(() => {
    const cb = $("cpbtn");
    cb.classList.add("ok");
    cb.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copié !`;
    setTimeout(() => {
      cb.classList.remove("ok");
      cb.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copier`;
    }, 2000);
  });
}

document.addEventListener("keydown", e => { if (e.key === "Escape") close_(); });

$("search").addEventListener("input", e => { searchVal = e.target.value; render(); });

const tags = [...new Set(EXPRESSIONS.map(e=>e.tag))];
$("filters").innerHTML = tags.map(t=>`<button class="fb" data-tag="${t}" onclick="ftag('${t}')">${TAGS[t]||t}</button>`).join('');

function ftag(t) {
  activeTag = activeTag===t ? null : t;
  document.querySelectorAll(".fb").forEach(b=>b.classList.toggle("on",b.dataset.tag===activeTag));
  render();
}

render();
</script>
</body>
</html>
